services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    dns:
      - 8.8.8.8
      - 8.8.4.4
    volumes:
      - ./ollama_data:/root/.ollama
    restart: always
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 12

  deepdoc_app:
    image: deepdoc_app:latest
    build: .
    container_name: deepdoc_ui
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - STREAMLIT_SERVER_FILE_WATCHER_TYPE=none
      - STREAMLIT_SERVER_RUN_ON_SAVE=false
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
    depends_on:
      ollama:
        condition: service_healthy
    command: streamlit run app.py --server.port=8501 --server.address=0.0.0.0 --server.fileWatcherType=none
    restart: always

networks:
  default:
    name: deepdoc-network
